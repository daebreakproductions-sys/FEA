<ion-header>
  <ion-toolbar>
    <ion-back-button slot="start" defaultHref="/tabs/feed"></ion-back-button>
    <ion-title>Sign in</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-grid>
    <ion-row>
      <ion-col class="ion-text-right">
        <ion-label color="secondary" [routerLink]="['/signup']">Sign Up</ion-label>
      </ion-col>
    </ion-row>
    <ion-row>
      <ion-col size="2"></ion-col>
      <ion-col size="8">
        <ion-img src="assets/images/cute_limes.png"></ion-img>
      </ion-col>
    </ion-row>
    <ion-row>
      <ion-col>
        <ion-item>
          <ion-label position="floating" [color]="loginFailed ? 'danger' : ''">Username</ion-label>
          <ion-input (keyup.enter)="gotoPasswordField()" [(ngModel)]="username" type="text"></ion-input>
        </ion-item>
        <ion-item>
          <ion-label position="floating" [color]="loginFailed ? 'danger' : ''">Password <ion-icon color="red" name="alert-circle-outline" *ngIf="loginFailed"></ion-icon></ion-label>
          <ion-input #inputToFocus (keyup.enter)="login()" [(ngModel)]="password" type="password"></ion-input>
        </ion-item>
      </ion-col>
    </ion-row>
    <ion-row>
      <ion-col class="ion-text-right">
        <ion-label color="secondary" (click)="resetPasswordLink()">Forgot password?</ion-label>
      </ion-col>
    </ion-row>
     <ion-row>
      <ion-col>
        <ion-button color="primary" expand="block" (click)="login()">Login</ion-button>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
