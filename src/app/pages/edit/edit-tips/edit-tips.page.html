<ion-header>
  <ion-toolbar>
    <ion-back-button defaultHref="/tabs/me/tips" slot="start"></ion-back-button>
    <ion-title>Edit your Tip</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content *ngIf="tip">
  <form [formGroup]="tipForm">
    <ion-grid class="ion-padding">
      <!-- Type -->
      <ion-row>
        <ion-col>
          <ion-item>
            <ion-label position="floating">Type</ion-label>
            <ion-select formControlName="type">
              <ng-container *ngFor="let choice of types">
                <ion-select-option [value]="choice.show">{{choice.show | titlecase}}</ion-select-option>
              </ng-container>
            </ion-select>
          </ion-item>
          <ng-container *ngFor="let validation of validation_messages.type">
            <ion-item *ngIf="tipForm.get('type').hasError(validation.type) && (tipForm.get('type').dirty || tipForm.get('type').touched)">
              <ion-label class="ion-text-wrap" color="danger">
                {{ validation.message }}
              </ion-label>
            </ion-item>
          </ng-container>
        </ion-col>
      </ion-row>
      <!-- Description -->
      <ion-row>
        <ion-col>
          <ion-item>
            <ion-label position="floating">Description</ion-label>
            <ion-textarea formControlName="description"></ion-textarea>
          </ion-item>
          <ng-container *ngFor="let validation of validation_messages.description">
            <ion-item *ngIf="tipForm.get('description').hasError(validation.type) && (tipForm.get('description').dirty || tipForm.get('description').touched)">
              <ion-label class="ion-text-wrap" color="danger">
                {{ validation.message }}
              </ion-label>
            </ion-item>
          </ng-container>
        </ion-col>
      </ion-row>
      <!-- Picture -->
      <eats-photo-edit [image64]="tip.image64" (photoUpdatedEvent)="updateImage($event)"></eats-photo-edit>
      <!-- Tags -->
      <eats-tag-edit [UGCId]="tip.id" (tagsUpdatedEvent)="updateTags($event)"></eats-tag-edit>
      <!-- Save Button -->
      <ion-row>
        <ion-col>
          <eats-once-button expand="block" buttonText="Save" [disabled]="!tipForm.valid" [click]="saveTip"></eats-once-button>
        </ion-col>
      </ion-row>
    </ion-grid>
  </form>
</ion-content>
